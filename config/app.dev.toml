[app]
env = "development"
domain = "http://localhost:5173"

[database]
url = "postgresql+asyncpg://postgres:postgres@db/quickestimate"

[auth]
jwt_secret_key_path = "/app/config-runtime/secret.key"
jwt_algorithm = "HS256"
jwt_access_token_expire_minutes = 60
google_oauth_client_id = ""
max_failed_login_attempts = 5
lock_minutes = 1
otp_expire_minutes = 10

[smtp]
host = "mailhog"
port = 1025
user = ""
password = ""
from = "noreply@example.com"
tls = false
ssl = false
timeout_seconds = 15

[server]
host = "0.0.0.0"
port = 8000
reload = true
startup_strict_checks = false
db_wait_host = "db"
db_wait_port = 5432
db_wait_timeout = 60

[logging]
levels = ["INFO", "ERROR"]
use_color = true
date_format = "%Y-%m-%d %H:%M:%S"

[logging.module_levels]
uvicorn.access = "ERROR"
uvicorn.error = "INFO"
sqlalchemy.engine = "ERROR"
alembic = "INFO"
