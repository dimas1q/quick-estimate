[app]
env = "production"
domain = "https://quickestimate.example.com"

[database]
url = "postgresql+asyncpg://postgres:postgres@db/quickestimate"

[auth]
jwt_secret_key_path = "/app/config-runtime/secret.key"
jwt_algorithm = "HS256"
jwt_access_token_expire_minutes = 60
jwt_refresh_token_expire_minutes = 43200
google_oauth_client_id = ""
max_failed_login_attempts = 5
lock_minutes = 15
otp_expire_minutes = 10

[smtp]
host = "smtp.example.com"
port = 587
user = ""
password = ""
from = "noreply@example.com"
tls = true
ssl = false
timeout_seconds = 15

[server]
host = "0.0.0.0"
port = 8000
reload = false
startup_strict_checks = true
db_wait_host = "db"
db_wait_port = 5432
db_wait_timeout = 60

[logging]
levels = ["INFO", "ERROR"]
use_color = true
date_format = "%Y-%m-%d %H:%M:%S"

[logging.module_levels]
uvicorn.access = "ERROR"
uvicorn.error = "INFO"
sqlalchemy.engine = "ERROR"
alembic = "INFO"
