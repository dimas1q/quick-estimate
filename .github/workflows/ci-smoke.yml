name: CI Smoke

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    name: Auth + Estimates Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quickestimate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quickestimate_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      CORS_ALLOW_ORIGINS: http://localhost:5173
      GOOGLE_OAUTH_CLIENT_IDS: test-client-id
      JWT_SECRET_KEY: test-jwt-secret
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/quickestimate_ci
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/quickestimate_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import time
          import psycopg2

          dsn = "dbname=quickestimate_ci user=postgres password=postgres host=127.0.0.1 port=5432"

          for _ in range(30):
              try:
                  with psycopg2.connect(dsn):
                      print("PostgreSQL is ready")
                      raise SystemExit(0)
              except Exception:
                  time.sleep(2)

          raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Migration smoke
        run: |
          alembic upgrade head
          alembic current

      - name: Run smoke tests
        run: |
          pytest -q \
            tests/test_auth_lockout.py \
            tests/test_access_control.py \
            tests/test_admin_rbac.py \
            tests/test_estimate_status_filter.py \
            tests/test_template_import_preview.py \
            tests/test_estimate_smoke.py
