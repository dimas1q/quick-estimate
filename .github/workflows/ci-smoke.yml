name: CI Smoke

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quickestimate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quickestimate_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      APP_ENV: test
      GOOGLE_OAUTH_CLIENT_ID: test-client-id
      JWT_SECRET_KEY: test-jwt-secret
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/quickestimate_ci
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/quickestimate_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL
        working-directory: backend
        run: |
          python - <<'PY'
          import time
          import psycopg2

          dsn = "dbname=quickestimate_ci user=postgres password=postgres host=127.0.0.1 port=5432"

          for _ in range(30):
              try:
                  with psycopg2.connect(dsn):
                      print("PostgreSQL is ready")
                      raise SystemExit(0)
              except Exception:
                  time.sleep(2)

          raise SystemExit("PostgreSQL did not become ready in time")
          PY

      - name: Migration smoke
        working-directory: backend
        run: |
          alembic upgrade head
          alembic current

      - name: Run smoke tests
        working-directory: backend
        run: |
          pytest -q \
            tests/test_auth_lockout.py \
            tests/test_auth_email_failures.py \
            tests/test_access_control.py \
            tests/test_admin_rbac.py \
            tests/test_startup_health_policy.py \
            tests/test_estimate_status_filter.py \
            tests/test_template_import_preview.py \
            tests/test_estimate_smoke.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: backend-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          APP_CONFIG_FILE: ../config/app.dev.toml
        run: |
          npm ci
          npm run generate:runtime-config
          npm run build
