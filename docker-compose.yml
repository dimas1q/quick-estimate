services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickestimate-app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_CONFIG_FILE: /app/config/app.toml
    volumes:
      - ./config/app.prod.toml:/app/config/app.toml:ro
      - app_runtime_state:/app/config-runtime
    restart: unless-stopped

  db:
    image: postgres:14
    container_name: quickestimate-db
    environment:
      POSTGRES_DB: quickestimate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
  app_runtime_state:
